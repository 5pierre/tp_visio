<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mon App</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 0 16px; }
    input { width: 60px; padding: 6px; font-size: 14px; }
    button { padding: 6px 14px; cursor: pointer; }
    #status { font-weight: bold; }
  </style>
</head>
<body>

  <h1>Mon App</h1>

  <h2>Health</h2>
  <p>Backend : <span id="status">...</span></p>

  <h2>Additionneur</h2>
  <input id="a" type="number" value="2" />
  +
  <input id="b" type="number" value="3" />
  <button onclick="add()">Calculer</button>
  <p id="result"></p>

  <script>
    const API = window.API_URL || "http://localhost:3000";

    fetch(API + "/health")
      .then(r => r.json())
      .then(d => document.getElementById("status").textContent = d.status)
      .catch(() => document.getElementById("status").textContent = "erreur");

    function add() {
      const a = document.getElementById("a").value;
      const b = document.getElementById("b").value;
      fetch(`${API}/add?a=${a}&b=${b}`)
        .then(r => r.json())
        .then(d => document.getElementById("result").textContent = "Résultat : " + (d.result ?? d.error));
    }
  </script>

</body>
</html>

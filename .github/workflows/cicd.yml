name: Pipeline CI/CD

on:
  push:
    branches:
      - main

jobs:

  # ── 1. Tests ────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installer les dépendances
        working-directory: ./backend
        run: npm install

      - name: Lancer les tests
        working-directory: ./backend
        run: npm test

  # ── 2. Build & Push Docker ──────────────────────────────────────
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Connexion DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Build et Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

  # ── 3. Déploiement sur VM Azure ─────────────────────────────────
  deploy:
    name: Déploiement Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Connexion à la VM et mise à jour Kubernetes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cd ~/tp_visio

            # Récupérer le dernier code
            git pull origin main

            # Mettre à jour les images Kubernetes (rolling update sans downtime)
            kubectl set image deployment/backend backend=${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
            kubectl set image deployment/frontend frontend=${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

            # Attendre que les pods redémarrent
            kubectl rollout status deployment/backend
            kubectl rollout status deployment/frontend

            # Relancer les port-forwards (tuer les anciens d'abord)
            pkill -f "kubectl port-forward" || true
            sleep 2
            nohup kubectl port-forward --address 0.0.0.0 service/frontend-service 80:80 > /tmp/pf-frontend.log 2>&1 &
            nohup kubectl port-forward --address 0.0.0.0 service/backend-service 30000:3000 > /tmp/pf-backend.log 2>&1 &

            echo "✅ Déploiement terminé !"
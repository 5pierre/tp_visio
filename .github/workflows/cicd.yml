# ── 3. Déploiement sur VM Azure ─────────────────────────────────
  deploy:
    name: Déploiement Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Connexion à la VM et mise à jour Kubernetes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          command_timeout: 5m
          script: |
            set -e

            echo "--- Pulling latest images ---"
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

            echo "--- Applying K8s manifests ---"
            cd ~/tp_visio
            kubectl apply -f k8s/secret.yml
            kubectl apply -f k8s/deployment.yml
            kubectl apply -f k8s/frontend.yml

            echo "--- Rolling restart ---"
            kubectl rollout restart deployment/backend
            kubectl rollout restart deployment/frontend

            echo "--- Waiting for rollout ---"
            kubectl rollout status deployment/backend --timeout=120s
            kubectl rollout status deployment/frontend --timeout=120s

            echo "--- Managing Port-Forwards ---"
            # Tuer les anciens processus pour éviter les conflits
            pkill -f "kubectl port-forward" || true
            sleep 2

            # Relancer les port-forward en les détachant totalement de la session (plus de timeout !)
            nohup kubectl port-forward --address 0.0.0.0 service/backend-service 30000:3000 > /dev/null 2>&1 < /dev/null &
            nohup kubectl port-forward --address 0.0.0.0 service/frontend-service 30001:80 > /dev/null 2>&1 < /dev/null &

            echo "--- Done ---"
            kubectl get pods
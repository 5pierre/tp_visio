name: Pipeline CI/CD

on:
  push:
    branches:
      - main

jobs:

  # ── 1. Tests ────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installer les dépendances
        working-directory: ./backend
        run: npm install

      - name: Lancer les tests
        working-directory: ./backend
        run: npm test

  # ── 2. Build & Push Docker ──────────────────────────────────────
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test          # bloqué si les tests échouent
    steps:
      - uses: actions/checkout@v4

      - name: Connexion DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Build et Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

  # ── 3. Déploiement sur VM Azure (connexion par mot de passe) ────
  deploy:
    name: Déploiement Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Connexion à la VM et mise à jour Kubernetes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          # ⚠️ Authentification par mot de passe uniquement (pas de clé SSH)
          script: |
            cd ~/projet_final_integration_deploiement

            # Récupérer le dernier code
            git pull origin main

            # Mettre à jour les images dans le cluster
            kubectl set image deployment/backend \
              backend=${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

            kubectl set image deployment/frontend \
              frontend=${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

            # Vérifier que les pods redémarrent bien
            kubectl rollout status deployment/backend
            kubectl rollout status deployment/frontend

            echo "✅ Déploiement terminé !"